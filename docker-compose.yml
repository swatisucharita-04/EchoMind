version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echomind-api
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - audio_data:/app/static/audio
    ports:
      - "8000:8000"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (served by Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: echomind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

  # ── Redis (Spotify token cache + future sessions) ─────────
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  audio_data:
  redis_data:

networks:
  default:
    name: echomind-network
